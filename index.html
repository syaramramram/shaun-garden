<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaun Garden 🌱</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            /* Latar belakang: Pemandangan peternakan & jendela */
            background: url('https://i.ibb.co/V3Y2CdB/farm-bg.jpg') no-repeat center center fixed; /* Placeholder background farm */
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3e2723;
        }

        /* Overlay gelap sedikit biar dashboard-nya menonjol */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.15);
            z-index: 0;
        }

        .main-frame {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 950px;
        }

        /* Papan Nama Shaun Garden Hijau */
        .header-sign {
            background: #43a047;
            color: white;
            padding: 10px 60px;
            border-radius: 12px;
            border: 6px solid #2e7d32;
            font-size: 3.5rem;
            font-weight: 900;
            width: fit-content;
            margin: 0 auto -20px;
            position: relative;
            z-index: 11;
            box-shadow: 0 10px 0 #1b5e20;
            text-shadow: 3px 3px 0 #1b5e20;
        }

        /* Dashboard Utama (Kayu Krem) */
        .dashboard-wood {
            background: #fdf5e6; /* Warna krem kayu muda */
            border: 12px solid #8d6e63; /* Frame kayu coklat */
            border-radius: 20px;
            padding: 50px 30px 30px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 100px rgba(141, 110, 99, 0.2);
        }

        .section-title {
            color: #2e7d32;
            font-weight: 900;
            font-size: 1.6rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Sensor Box - Mirip di Gambar */
        .sensor-card {
            background: rgba(255,255,255,0.4);
            border: 2px dashed #bcaaa4;
            border-radius: 15px;
            padding: 20px;
        }

        .sensor-item {
            margin-bottom: 15px;
        }

        .sensor-label {
            font-weight: 800;
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: block;
        }

        .display-lcd {
            background: #222;
            color: #39ff14;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Tombol ON/OFF Bulat & Besar */
        .control-card {
            background: rgba(255,255,255,0.4);
            border: 2px dashed #bcaaa4;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .status-box {
            background: #5d4037;
            color: #ffeb3b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 4px solid #3e2723;
        }

        .bolt-icon { font-size: 4rem; margin-bottom: 10px; }

        .btn-control {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: none;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 10px;
        }

        .btn-on {
            background: #4caf50; color: white;
            box-shadow: 0 8px 0 #2e7d32;
        }
        .btn-off {
            background: #f44336; color: white;
            box-shadow: 0 8px 0 #b71c1c;
        }
        .btn-control:active { transform: translateY(6px); box-shadow: none; }

        /* Setup / Nav Atas */
        .nav-top {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.7);
            color: white; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 0.8rem;
        }

        @media (max-width: 800px) {
            .dashboard-wood { grid-template-columns: 1fr; margin-top: 50px; }
            .header-sign { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="nav-top">
    <div>BT: <span id="st-bt">OFF</span> | DB: <span id="st-fb">OFF</span></div>
    <div onclick="document.getElementById('setup').style.display='block'" style="cursor:pointer">SETUP <i class="fas fa-cog"></i></div>
</div>

<div class="main-frame">
    <div class="header-sign">Shaun garden</div>
    
    <div class="dashboard-wood">
        <div class="sensor-card">
            <h2 class="section-title">LIVE SENSOR DATA <i class="fas fa-leaf"></i></h2>
            
            <div class="sensor-item">
                <span class="sensor-label">ULTRASONIK 1 - P0 / P1</span>
                <div class="display-lcd"><i class="fas fa-water"></i> <span id="val-jarak">--</span><small>cm</small></div>
            </div>

            <div class="sensor-item">
                <span class="sensor-label">ULTRASONIK 2 - P3 / P8</span>
                <div class="display-lcd"><i class="fas fa-tint"></i> <span id="val-jarak-manual">--</span><small>cm</small></div>
            </div>

            <div class="sensor-item">
                <span class="sensor-label">DHT22 - SUHU & HUMIDITY</span>
                <div class="display-lcd" style="font-size: 1.4rem;">
                    <span id="val-suhu">--</span>°C | <span id="val-lembab">--</span>%
                </div>
            </div>
        </div>

        <div class="control-card">
            <h2 class="section-title">CONTROL & STATUS <i class="fas fa-bolt"></i></h2>
            
            <div class="status-box">
                <div class="bolt-icon" id="relay-icon"><i class="fas fa-bolt"></i></div>
                <div style="font-weight: 900;" id="lbl-relay">RELAY OFF</div>
            </div>

            <div style="margin-bottom: 20px;">
                <button class="btn-control btn-on" onclick="window.toggleRelay(true)">ON</button>
                <button class="btn-control btn-off" onclick="window.toggleRelay(false)">OFF</button>
            </div>

            <button id="btn-mode" onclick="toggleMode()" style="width:100%; padding:12px; background:white; border:2px solid #8d6e63; border-radius:10px; font-weight:900; color:#5d4037; cursor:pointer;">
                MODE: OTOMATIS
            </button>
        </div>
    </div>
</div>

<div id="setup" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%); background:white; padding:30px; border-radius:15px; z-index:100; box-shadow:0 0 100px rgba(0,0,0,0.5);">
    <h3>Connection Settings</h3>
    <input type="text" id="fb-apiKey" placeholder="Firebase API Key" style="display:block; width:100%; margin:10px 0; padding:8px;">
    <input type="text" id="fb-dbUrl" placeholder="Firebase DB URL" style="display:block; width:100%; margin:10px 0; padding:8px;">
    <button onclick="connectFirebase()" style="background:#2e7d32; color:white; border:none; padding:10px 20px; border-radius:5px;">Connect Firebase</button>
    <button onclick="connectBLE()" style="background:#5d4037; color:white; border:none; padding:10px 20px; border-radius:5px;">Connect Micro:bit</button>
    <button onclick="this.parentElement.style.display='none'" style="background:#ccc; border:none; padding:10px; margin-top:10px;">Close</button>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getDatabase, ref, onValue, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    const state = { db: null, tx: null, rx: null, isAuto: true };

    window.connectBLE = async () => {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "BBC micro:bit" }],
            optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
        state.tx = await service.getCharacteristic("6e400002-b5a3-f393-e0a9-e50e24dcca9e");
        state.rx = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
        
        await state.tx.startNotifications();
        state.tx.addEventListener('characteristicvaluechanged', (e) => {
            const val = new TextDecoder().decode(e.target.value);
            const [key, n] = val.trim().split(',');
            if(key === "jarak") document.getElementById('val-jarak').innerText = n;
            if(key === "jarak_manual") document.getElementById('val-jarak-manual').innerText = n;
            if(key === "Relay") updateUI(n == "1");
            if(state.db) update(ref(state.db, "smarthome/ruangan1/" + key), { value: parseFloat(n) });
        });
        document.getElementById('st-bt').innerText = "CONNECTED";
    };

    window.toggleRelay = async (on) => {
        if(state.rx) await state.rx.writeValue(new TextEncoder().encode(`Relay,${on?1:0}\n`));
    };

    window.toggleMode = () => {
        state.isAuto = !state.isAuto;
        document.getElementById('btn-mode').innerText = state.isAuto ? "MODE: OTOMATIS" : "MODE: MANUAL";
        if(state.rx) state.rx.writeValue(new TextEncoder().encode(`mode,${state.isAuto?1:0}\n`));
    };

    function updateUI(on) {
        document.getElementById('lbl-relay').innerText = on ? "RELAY ON" : "RELAY OFF";
        document.getElementById('relay-icon').style.color = on ? "#39ff14" : "#ffeb3b";
    }

    window.connectFirebase = () => {
        const config = { apiKey: document.getElementById('fb-apiKey').value, databaseURL: document.getElementById('fb-dbUrl').value };
        state.db = getDatabase(initializeApp(config));
        document.getElementById('st-fb').innerText = "CONNECTED";
    };
</script>

</body>
</html>
