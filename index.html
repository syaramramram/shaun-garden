<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaun Garden Dashboard 🌱</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --wood: #8d6e63;
            --dark-wood: #5d4037;
            --grass: #7ba37a;
            --panel: #f5f5dc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            /* Background utama: Tekstur Kayu Hangat */
            background: #d7ccc8 url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* JENDELA DENGAN PEMANDANGAN PETERNAKAN */
        .scenery-window {
            position: fixed;
            top: 40px;
            width: 85%;
            height: 350px;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80') center/cover;
            border: 15px solid var(--dark-wood);
            border-radius: 10px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.3), 0 20px 40px rgba(0,0,0,0.4);
            z-index: 0;
            display: flex;
            justify-content: center;
        }

        .scenery-window::before { /* Bingkai tengah jendela */
            content: '';
            width: 15px;
            height: 100%;
            background: var(--dark-wood);
        }

        /* CONTAINER UTAMA */
        .wrapper {
            width: 95%;
            max-width: 1000px;
            margin-top: 220px; /* Menumpuk di atas jendela */
            z-index: 10;
            position: relative;
        }

            font-weight: 900;
            text-align: center;
            width: fit-content;
